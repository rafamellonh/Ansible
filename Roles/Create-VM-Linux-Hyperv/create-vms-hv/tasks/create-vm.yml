---
- name: Create directory for VM
  win_file:
    path: "{{ vm_root }}\\{{ vm_name }}"
    state: directory

- name: Check if disk exisssts
  win_stat:
    Path: "{{vm_root}}\\{{ vm_name }}\\{{ vm_name }}.vhdx"
  register: disk_stat


- name: Create disk child
  when: not disk_stat.stat.exists
  ansible.windows.win_shell: |
    New-VHD `
      -Path "{{ vm_root }}\\{{ vm_name }}\\{{ vm_name }}.vhdx" `
      -ParentPath "{{ parent_disk }}" `
      -Differencing

- name: Create VM
  when: not disk_stat.stat.exists
  win_shell: |
    new-vm `
      -Name: "{{ vm_name }}" `
      -MemoryStartupBytes: 2GB `
      -Generation: 1 `
      -Path: "{{ vm_root }}\\{{ vm_name }}" `
      -Vhdpath: "{{ vm_disk }}" `
      -Switchname: "vswitch" 






          
          